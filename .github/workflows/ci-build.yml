name: CI Build

on:
  push:
    branches:
      - 'feature/**'
      - 'bug/**'
  workflow_dispatch:

env:
  TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL || '' }}
  TEST_SUPABASE_KEY: ${{ secrets.TEST_SUPABASE_KEY || '' }}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Run Unit Tests (non-integration)
        run: |
          [[ -n "$TEST_SUPABASE_URL" ]] && echo "Secrets available — running all tests" || \
            echo "No secrets — skipping SupabaseIntegrationTest"
          ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Upload APK (debug)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
